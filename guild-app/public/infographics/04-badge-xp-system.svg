<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t4 { font-family: Inter, system-ui, sans-serif; font-weight: 700; fill: #f8fafc; }
      .s4 { font-family: Inter, system-ui, sans-serif; font-weight: 500; fill: #94a3b8; }
      .b4 { font-family: Inter, system-ui, sans-serif; font-weight: 400; fill: #cbd5e1; }
      .c4 { font-family: Inter, system-ui, sans-serif; font-weight: 500; fill: #2dd4bf; }
      .h4 { font-family: Inter, system-ui, sans-serif; font-weight: 600; }
      .mono { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg4)"/>

  <!-- Header -->
  <text x="540" y="75" text-anchor="middle" class="s4" font-size="22">REPUTATION</text>
  <text x="540" y="125" text-anchor="middle" class="t4" font-size="48">Badge &amp; XP System</text>
  <text x="540" y="165" text-anchor="middle" class="s4" font-size="20">On-chain NFT identity that grows with you</text>

  <!-- Vertical tier ladder -->
  <!-- Connecting line -->
  <line x1="200" y1="240" x2="200" y2="880" stroke="#334155" stroke-width="3"/>

  <!-- Tier 5: Elder (top) -->
  <g transform="translate(200, 280)">
    <circle cx="0" cy="0" r="36" fill="#0f172a" stroke="#00e49f" stroke-width="3" filter="url(#glow4)"/>
    <text x="0" y="7" text-anchor="middle" font-size="24">👑</text>
    <rect x="60" y="-45" width="720" height="90" rx="16" fill="#1e293b" stroke="#00e49f" stroke-width="2"/>
    <text x="90" y="-15" class="h4" font-size="24" fill="#00e49f">Elder</text>
    <text x="90" y="12" class="b4" font-size="15">Maximum governance influence • Community leadership</text>
    <text x="90" y="32" class="b4" font-size="13">Can mentor new members and guide strategic decisions</text>
    <rect x="520" y="-30" width="120" height="30" rx="8" fill="#00e49f" fill-opacity="0.15"/>
    <text x="580" y="-9" text-anchor="middle" class="mono" font-size="16" fill="#00e49f">Lv.5</text>
    <rect x="660" y="-30" width="100" height="30" rx="8" fill="#0f172a" stroke="#00e49f" stroke-width="1"/>
    <text x="710" y="-9" text-anchor="middle" class="mono" font-size="14" fill="#00e49f">10,000 XP</text>
  </g>

  <!-- Tier 4: Steward -->
  <g transform="translate(200, 420)">
    <circle cx="0" cy="0" r="36" fill="#0f172a" stroke="#f59e0b" stroke-width="3" filter="url(#glow4)"/>
    <text x="0" y="7" text-anchor="middle" font-size="24">⚜️</text>
    <rect x="60" y="-45" width="720" height="90" rx="16" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="90" y="-15" class="h4" font-size="24" fill="#f59e0b">Steward</text>
    <text x="90" y="12" class="b4" font-size="15">High governance weight • Trusted community member</text>
    <text x="90" y="32" class="b4" font-size="13">Can verify bounties and moderate proposals</text>
    <rect x="520" y="-30" width="120" height="30" rx="8" fill="#f59e0b" fill-opacity="0.15"/>
    <text x="580" y="-9" text-anchor="middle" class="mono" font-size="16" fill="#f59e0b">Lv.4</text>
    <rect x="660" y="-30" width="100" height="30" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
    <text x="710" y="-9" text-anchor="middle" class="mono" font-size="14" fill="#f59e0b">2,000 XP</text>
  </g>

  <!-- Tier 3: Builder -->
  <g transform="translate(200, 560)">
    <circle cx="0" cy="0" r="36" fill="#0f172a" stroke="#a78bfa" stroke-width="3" filter="url(#glow4)"/>
    <text x="0" y="7" text-anchor="middle" font-size="24">🔨</text>
    <rect x="60" y="-45" width="720" height="90" rx="16" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <text x="90" y="-15" class="h4" font-size="24" fill="#a78bfa">Builder</text>
    <text x="90" y="12" class="b4" font-size="15">Active contributor • Enhanced voting power</text>
    <text x="90" y="32" class="b4" font-size="13">Can claim high-value bounties and create proposals</text>
    <rect x="520" y="-30" width="120" height="30" rx="8" fill="#a78bfa" fill-opacity="0.15"/>
    <text x="580" y="-9" text-anchor="middle" class="mono" font-size="16" fill="#a78bfa">Lv.3</text>
    <rect x="660" y="-30" width="100" height="30" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
    <text x="710" y="-9" text-anchor="middle" class="mono" font-size="14" fill="#a78bfa">500 XP</text>
  </g>

  <!-- Tier 2: Contributor -->
  <g transform="translate(200, 700)">
    <circle cx="0" cy="0" r="36" fill="#0f172a" stroke="#4ea8de" stroke-width="3" filter="url(#glow4)"/>
    <text x="0" y="7" text-anchor="middle" font-size="24">⚡</text>
    <rect x="60" y="-45" width="720" height="90" rx="16" fill="#1e293b" stroke="#4ea8de" stroke-width="2"/>
    <text x="90" y="-15" class="h4" font-size="24" fill="#4ea8de">Contributor</text>
    <text x="90" y="12" class="b4" font-size="15">Engaged member • Active contributor</text>
    <text x="90" y="32" class="b4" font-size="13">Can participate in bounties and earn XRD</text>
    <rect x="520" y="-30" width="120" height="30" rx="8" fill="#4ea8de" fill-opacity="0.15"/>
    <text x="580" y="-9" text-anchor="middle" class="mono" font-size="16" fill="#4ea8de">Lv.2</text>
    <rect x="660" y="-30" width="100" height="30" rx="8" fill="#0f172a" stroke="#4ea8de" stroke-width="1"/>
    <text x="710" y="-9" text-anchor="middle" class="mono" font-size="14" fill="#4ea8de">100 XP</text>
  </g>

  <!-- Tier 1: Member (bottom) -->
  <g transform="translate(200, 840)">
    <circle cx="0" cy="0" r="36" fill="#0f172a" stroke="#8888a0" stroke-width="3"/>
    <text x="0" y="7" text-anchor="middle" font-size="24">🛡️</text>
    <rect x="60" y="-45" width="720" height="90" rx="16" fill="#1e293b" stroke="#8888a0" stroke-width="2"/>
    <text x="90" y="-15" class="h4" font-size="24" fill="#8888a0">Member</text>
    <text x="90" y="12" class="b4" font-size="15">Starting tier • Base voting rights</text>
    <text x="90" y="32" class="b4" font-size="13">Mint your free badge to begin your journey</text>
    <rect x="520" y="-30" width="120" height="30" rx="8" fill="#8888a0" fill-opacity="0.15"/>
    <text x="580" y="-9" text-anchor="middle" class="mono" font-size="16" fill="#8888a0">Lv.1</text>
    <rect x="660" y="-30" width="100" height="30" rx="8" fill="#0f172a" stroke="#8888a0" stroke-width="1"/>
    <text x="710" y="-9" text-anchor="middle" class="mono" font-size="14" fill="#8888a0">0 XP</text>
  </g>

  <!-- Callout boxes -->
  <rect x="80" y="940" width="280" height="55" rx="10" fill="#1e293b" stroke="#2dd4bf" stroke-width="1"/>
  <text x="220" y="965" text-anchor="middle" class="c4" font-size="14">🔗 On-chain NFT Badge</text>
  <text x="220" y="982" text-anchor="middle" class="b4" font-size="12">Stored on Radix ledger</text>

  <rect x="400" y="940" width="280" height="55" rx="10" fill="#1e293b" stroke="#4ea8de" stroke-width="1"/>
  <text x="540" y="965" text-anchor="middle" class="c4" font-size="14">🆓 Free to Mint</text>
  <text x="540" y="982" text-anchor="middle" class="b4" font-size="12">No XRD required to start</text>

  <rect x="720" y="940" width="280" height="55" rx="10" fill="#1e293b" stroke="#00e49f" stroke-width="1"/>
  <text x="860" y="965" text-anchor="middle" class="c4" font-size="14">📈 XP = Influence</text>
  <text x="860" y="982" text-anchor="middle" class="b4" font-size="12">More XP → higher tier</text>

  <!-- Footer -->
  <text x="540" y="1040" text-anchor="middle" class="s4" font-size="16">radix-guild.org — Earn Your Reputation</text>

  <!-- Corner decorations -->
  <path d="M0 0 L50 0 L0 50 Z" fill="#a78bfa" opacity="0.08"/>
  <path d="M1080 1080 L1030 1080 L1080 1030 Z" fill="#a78bfa" opacity="0.08"/>
</svg>
