<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ea8de" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .t3 { font-family: Inter, system-ui, sans-serif; font-weight: 700; fill: #f8fafc; }
      .s3 { font-family: Inter, system-ui, sans-serif; font-weight: 500; fill: #94a3b8; }
      .b3 { font-family: Inter, system-ui, sans-serif; font-weight: 400; fill: #cbd5e1; }
      .h3 { font-family: Inter, system-ui, sans-serif; font-weight: 600; fill: #f8fafc; }
      .c3 { font-family: Inter, system-ui, sans-serif; font-weight: 500; fill: #2dd4bf; }
      .xrd { font-family: 'JetBrains Mono', monospace; font-weight: 600; fill: #4ea8de; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg3)"/>

  <!-- Header -->
  <text x="540" y="75" text-anchor="middle" class="s3" font-size="22">BOUNTIES</text>
  <text x="540" y="125" text-anchor="middle" class="t3" font-size="48">Bounty Pipeline</text>
  <text x="540" y="165" text-anchor="middle" class="s3" font-size="20">Earn XRD for your contributions</text>

  <!-- Central pipeline -->
  <rect x="200" y="210" width="680" height="660" rx="20" fill="url(#pipe)" stroke="#334155" stroke-width="1"/>

  <!-- Stage 1: Open -->
  <g transform="translate(540, 280)">
    <rect x="-280" y="-40" width="560" height="80" rx="14" fill="#1e293b" stroke="#2dd4bf" stroke-width="2"/>
    <circle cx="-240" cy="0" r="24" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
    <text x="-240" y="7" text-anchor="middle" class="c3" font-size="18">📋</text>
    <text x="-180" y="-8" class="h3" font-size="20">Bounty Posted</text>
    <text x="-180" y="16" class="b3" font-size="14">Admin creates bounty with XRD reward</text>
    <text x="220" y="7" text-anchor="middle" class="xrd" font-size="18">💰 Escrow</text>
  </g>

  <!-- Arrow -->
  <polygon points="540,340 530,350 550,350" fill="#2dd4bf" opacity="0.5"/>

  <!-- Stage 2: Claim -->
  <g transform="translate(540, 390)">
    <rect x="-260" y="-40" width="520" height="80" rx="14" fill="#1e293b" stroke="#4ea8de" stroke-width="2"/>
    <circle cx="-220" cy="0" r="24" fill="#0f172a" stroke="#4ea8de" stroke-width="2"/>
    <text x="-220" y="7" text-anchor="middle" class="c3" font-size="18">🙋</text>
    <text x="-160" y="-8" class="h3" font-size="20">Claim / Assign</text>
    <text x="-160" y="16" class="b3" font-size="14">Developer claims the bounty</text>
    <text x="200" y="7" text-anchor="middle" class="xrd" font-size="18">🔒 Locked</text>
  </g>

  <!-- Arrow -->
  <polygon points="540,450 530,460 550,460" fill="#4ea8de" opacity="0.5"/>

  <!-- Stage 3: Submit -->
  <g transform="translate(540, 500)">
    <rect x="-240" y="-40" width="480" height="80" rx="14" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="-200" cy="0" r="24" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
    <text x="-200" y="7" text-anchor="middle" class="c3" font-size="18">📦</text>
    <text x="-140" y="-8" class="h3" font-size="20">Submit Work</text>
    <text x="-140" y="16" class="b3" font-size="14">Developer submits deliverables</text>
    <text x="180" y="7" text-anchor="middle" class="xrd" font-size="18">🔒 Locked</text>
  </g>

  <!-- Arrow -->
  <polygon points="540,560 530,570 550,570" fill="#a78bfa" opacity="0.5"/>

  <!-- Stage 4: Verify -->
  <g transform="translate(540, 610)">
    <rect x="-220" y="-40" width="440" height="80" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="-180" cy="0" r="24" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <text x="-180" y="7" text-anchor="middle" class="c3" font-size="18">✅</text>
    <text x="-120" y="-8" class="h3" font-size="20">Admin Verify</text>
    <text x="-120" y="16" class="b3" font-size="14">Work reviewed and approved</text>
    <text x="160" y="7" text-anchor="middle" class="xrd" font-size="18">🔒 Locked</text>
  </g>

  <!-- Arrow -->
  <polygon points="540,670 530,680 550,680" fill="#f59e0b" opacity="0.5"/>

  <!-- Stage 5: Dispute Window -->
  <g transform="translate(540, 720)">
    <rect x="-200" y="-40" width="400" height="80" rx="14" fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3"/>
    <circle cx="-160" cy="0" r="24" fill="#0f172a" stroke="#f59e0b" stroke-width="2"/>
    <text x="-160" y="7" text-anchor="middle" class="c3" font-size="18">⏳</text>
    <text x="-100" y="-8" class="h3" font-size="20">Dispute Window (72h)</text>
    <text x="-100" y="16" class="b3" font-size="14">Community can raise disputes</text>
  </g>

  <!-- Arrow -->
  <polygon points="540,780 530,790 550,790" fill="#00e49f" opacity="0.5"/>

  <!-- Stage 6: Payment -->
  <g transform="translate(540, 830)">
    <rect x="-180" y="-40" width="360" height="80" rx="14" fill="#1e293b" stroke="#00e49f" stroke-width="2.5" filter="url(#glow3)"/>
    <circle cx="-140" cy="0" r="24" fill="#0f172a" stroke="#00e49f" stroke-width="2"/>
    <text x="-140" y="7" text-anchor="middle" class="c3" font-size="18">💸</text>
    <text x="-80" y="-8" class="h3" font-size="20">Payment Released</text>
    <text x="-80" y="16" class="b3" font-size="14">XRD sent + XP awarded</text>
  </g>

  <!-- Callout boxes -->
  <rect x="80" y="930" width="280" height="60" rx="10" fill="#1e293b" stroke="#2dd4bf" stroke-width="1"/>
  <text x="220" y="957" text-anchor="middle" class="c3" font-size="14">🛡️ Escrow Protection</text>
  <text x="220" y="977" text-anchor="middle" class="b3" font-size="12">Funds locked until verified</text>

  <rect x="400" y="930" width="280" height="60" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="540" y="957" text-anchor="middle" class="c3" font-size="14">⚖️ Dispute Mechanism</text>
  <text x="540" y="977" text-anchor="middle" class="b3" font-size="12">72h window for challenges</text>

  <rect x="720" y="930" width="280" height="60" rx="10" fill="#1e293b" stroke="#00e49f" stroke-width="1"/>
  <text x="860" y="957" text-anchor="middle" class="c3" font-size="14">⭐ XP Rewards</text>
  <text x="860" y="977" text-anchor="middle" class="b3" font-size="12">Grow your reputation</text>

  <!-- Footer -->
  <text x="540" y="1040" text-anchor="middle" class="s3" font-size="16">radix-guild.org — Contribute, Earn, Build</text>

  <!-- Corner decorations -->
  <path d="M0 0 L50 0 L0 50 Z" fill="#4ea8de" opacity="0.08"/>
  <path d="M1080 1080 L1030 1080 L1080 1030 Z" fill="#4ea8de" opacity="0.08"/>
</svg>
